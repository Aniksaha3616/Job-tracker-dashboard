<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker</title>
    <!-- Tailwind + daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"     rel="stylesheet">
    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body class="bg-base-200 min-h-screen p-3">
    <div max-w-6xl mx-auto p-6>
        <!-- Header -->
        <h1 class="text-3xl font-bold mb-6">Job Application Dashboard</h1>
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

            <div class="card bg-base-100 shadow">
            <div class="card-body">
                <h2 class="text-sm text-base-500">Total Jobs</h2>
                <p id="totalCount" class="text-3xl font-bold">0</p>
            </div>
            </div>

            <div class="card bg-base-100 shadow">
            <div class="card-body">
                <h2 class="text-sm text-base-500">Interview</h2>
                <p id="interviewCount" class="text-3xl font-bold text-success">0</p>
            </div>
            </div>

            <div class="card bg-base-100 shadow">
            <div class="card-body">
                <h2 class="text-sm text-base-500">Rejected</h2>
                <p id="rejectedCount" class="text-3xl font-bold text-error">0</p>
            </div>
            </div>

        </div>

        <!-- Available Jobs Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-[#002C5C]">Available Jobs</h2>
            <span id="sectionCount" class="badge  text-base-500 font-bold">0 jobs</span>
        </div>
        <!-- Tabs -->

        <div class="tabs tabs-boxed bg-transparent gap-3 mb-6">
            <button class="tab job-tab bg-blue-600 text-white rounded-md px-6" data-tab="all">All</button>
            <button class="tab job-tab bg-red-200 text-gray-600 rounded-md px-6" data-tab="interview">Interview</button>
            <button class="tab job-tab bg-green-200 text-gray-600 rounded-md px-6 " data-tab="rejected">Rejected</button>
        </div>
        <!-- Jobs Grid -->
        <div id="jobList" class="grid grid-cols-1 gap-6"></div>
        <!-- Empty box -->
        <div id="emptyState" class="hidden text-center mx-auto py-16">
            <div class="text-6xl mb-4  "><img src="./asset/jobs.png"></div>
            <h3 class="text-xl font-semibold">No jobs available</h3>
            <p class="text-gray-500">Select another tab or add new opportunities.</p>
        </div>

        <!-- job templete -->
        <template id="jobCardTemplate">
            <div class="card bg-base-100 shadow">
                <div class="card-body">
                    <h2 class="card-title company"></h2>
                    <p class="font-medium position"></p>
                    <p class="text-sm text-gray-500 meta"></p>
                    <p class="text-sm font-semibold salary"></p>
                    <button class="btn btn-ghost btn-sm notAppliedBtn text-info w-40">
                    NOT APPLIED
                    </button>
                    <p class="text-sm mt-2 description"></p>

                    <div class="flex flex-wrap gap-2 mt-4">
                        <button class="btn interviewBtn
                            px-3 py-1 text-xs font-semibold rounded
                            border border-success text-success
                            hover:bg-success hover:text-white
                            transition duration-200">Interview</button>
                        <button class="btn rejectedBtn
                            px-3 py-1 text-xs font-semibold rounded
                            border border-error text-error
                            hover:bg-error hover:text-white
                            ransition duration-200                  ">Rejected</button>
                        <button class="btn deleteBtn
                    px-3 py-1 text-xs font-semibold rounded
                    border border-gray-400 text-gray-600
                    hover:bg-gray-500 hover:text-white
                    transition duration-200">Delete</button>
                    </div>
                </div>
            </div>
        </template>
  </div>

    


    <script src="./app.js"></script>
</body>
</html>
