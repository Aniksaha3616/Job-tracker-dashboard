<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobTracker</title>
    <!-- Tailwind + daisy -->
     <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- Fonts -->
     <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap"     rel="stylesheet">
    <!-- icons -->
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        *{
            font-family: "Outfit", sans-serif;
        }
    </style>
</head>
<body class="bg-base-200 min-h-screen p-3">
    <div max-w-6xl mx-auto p-6>
        <!-- Header -->
        <h1 class="text-3xl font-bold mb-6">Job Application Dashboard</h1>
        <!-- Dashboard Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">

            <div class="card bg-base-100 shadow">
            <div class="card-body">
                <h2 class="text-sm text-base-500">Total Jobs</h2>
                <p id="totalCount" class="text-3xl font-bold">0</p>
            </div>
            </div>

            <div class="card bg-base-100 shadow">
            <div class="card-body">
                <h2 class="text-sm text-base-500">Interview</h2>
                <p id="interviewCount" class="text-3xl font-bold text-success">0</p>
            </div>
            </div>

            <div class="card bg-base-100 shadow">
            <div class="card-body">
                <h2 class="text-sm text-base-500">Rejected</h2>
                <p id="rejectedCount" class="text-3xl font-bold text-error">0</p>
            </div>
            </div>

        </div>

        <!-- Available Jobs Header -->
        <div class="flex justify-between items-center mb-4">
            <h2 class="text-xl font-semibold text-[#002C5C]">Available Jobs</h2>
            <span id="sectionCount" class="badge  text-base-500 font-bold">0 jobs</span>
        </div>
        <!-- Tabs -->

        <div class="tabs tabs-boxed mb-6">
            <button class="tab tab-active" data-tab="all">All</button>
            <button class="tab" data-tab="interview">Interview</button>
            <button class="tab" data-tab="rejected">Rejected</button>
        </div>
        <!-- Jobs Grid -->
        <div id="jobList" class="grid grid-cols-1 gap-6"></div>
        <!-- Empty box -->
        <div id="emptyState" class="hidden text-center py-16">
        <div class="text-6xl mb-4"><img src="./asset/jobs.png" alt=""></div>
        <h3 class="text-xl font-semibold">No jobs available</h3>
        <p class="text-gray-500">Select another tab or add new opportunities.</p>


        
  </div>

    </div>


    <script src="./app.js"></script>
</body>
</html>
